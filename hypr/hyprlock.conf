source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 0
}

animations {
    enabled = true
    in = fade, 400ms
    out = fade, 200ms
}

shape {
    monitor =
    size = 520, 480
    color = rgba(0, 0, 0, 0.35)
    rounding = 20
    border_size = 0
    position = 0, -150
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:2000] bash -c "~/.config/hypr/scripts/media.sh"
    font_family = JetBrainsMono Nerd Font
    font_size = 16
    font_weight = 400
    position = 0, 10
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] bash -c "~/.config/hypr/scripts/time.sh"
    color = $font_color
    font_family = JetBrainsMono Nerd Font
    font_size = 96
    font_weight = 300
    position = 0, -180
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] bash -c "~/.config/hypr/scripts/date.sh"
    color = rgba(255, 255, 255, 0.7)
    font_family = JetBrainsMono Nerd Font
    font_size = 28
    font_weight = 400
    position = 0, -80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 400, 72
    position = 0, -300
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 3

    font_family = JetBrainsMono Nerd Font
    font_size = 24
    font_color = $font_color

    placeholder_text = enter password
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 12
    shadow_passes = 0
    fade_on_empty = false
    hide_input = false
}

auth {
    fingerprint:enabled = false
}
