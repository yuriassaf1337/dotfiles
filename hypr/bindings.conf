# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Rebind SUPER+L from workspace layout toggle to lock screen
unbind = SUPER, L
bindd = SUPER, L, Lock screen, exec, omarchy-lock-screen

# unbind old print keys
unbind = , PRINT
unbind = SHIFT, PRINT
unbind = CTRL, PRINT
unbind = ALT, PRINT
unbind = CTRL ALT, PRINT
unbind = SUPER, PRINT

bindd = SUPER SHIFT, S, Screenshot of region, exec, ~/.local/share/omarchy/bin/omarchy-cmd-screenshot
bindd = SUPER SHIFT, L, Toggle keyboard layout, exec, omarchy-toggle-keyboard-layout

# Reverse workspace switching direction for SUPER + scroll
unbind = SUPER, mouse_down
unbind = SUPER, mouse_up
bindd = SUPER, mouse_up, Scroll active workspace forward, workspace, e+1
bindd = SUPER, mouse_down, Scroll active workspace backward, workspace, e-1
